name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run migrations / seed (optional)
        run: echo "Add migration commands here if needed"
        # run: pnpm migrate:latest

      - name: Health check
        run: |
          echo "Deployment artifact ready at ./dist/"
          echo "To add deployment steps, configure one of:"
          echo "  - Railway: railway login && railway up"
          echo "  - Render:  Use Render GitHub integration or render-cli"
          echo "  - Docker: docker build -t app . && docker push registry/app"
          echo "  - Custom: Add your deployment commands below"

